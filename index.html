<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The AI Stack - Budapest Meetup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #111827;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .container {
            max-width: 56rem;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }
        
        .text-center {
            text-align: center;
        }
        
        .icon-container {
            display: inline-block;
            margin-bottom: 2rem;
        }
        
        .icon {
            width: 5rem;
            height: 5rem;
            margin: 0 auto;
            color: #60a5fa;
        }
        
        h1 {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #60a5fa, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .location {
            font-size: 1.5rem;
            color: #9ca3af;
            margin-bottom: 2rem;
        }
        
        .badge-container {
            margin-bottom: 3rem;
        }
        
        .badge {
            display: inline-block;
            padding: 0.75rem 2rem;
            font-size: 1.125rem;
            font-weight: 600;
            color: #60a5fa;
            border: 2px solid #60a5fa;
            border-radius: 9999px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .badge:hover {
            background-color: #60a5fa;
            color: #111827;
        }
        
        .description {
            font-size: 1.25rem;
            color: #d1d5db;
            max-width: 42rem;
            margin: 0 auto 3rem;
            line-height: 1.75;
        }
        
        .dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            opacity: 0.5;
        }
        
        .dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 9999px;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .dot-1 {
            background-color: #60a5fa;
        }
        
        .dot-2 {
            background-color: #c084fc;
            animation-delay: 0.2s;
        }
        
        .dot-3 {
            background-color: #f472b6;
            animation-delay: 0.4s;
        }
        
        .footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 1.5rem;
            text-align: center;
            color: #6b7280;
            font-size: 0.875rem;
        }
        
        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: .5;
            }
        }
        
        .fade-in {
            animation: fadeIn 1s ease-out;
        }
        
        .fade-in-delay {
            animation: fadeIn 1s ease-out 0.3s both;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
            }
            .location {
                font-size: 1.25rem;
            }
            .description {
                font-size: 1.125rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-center">
            <!-- Logo/Icon -->
            <div class="fade-in icon-container">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                </svg>
            </div>

            <!-- Main Title -->
            <h1 class="fade-in">
                The AI Stack
            </h1>

            <!-- Location -->
            <p class="fade-in-delay location">
                Budapest, Hungary
            </p>

            <!-- Coming Soon Badge -->
            <div class="fade-in-delay badge-container">
                <span class="badge">
                    Coming Soon
                </span>
            </div>

            <!-- Description -->
            <p class="fade-in-delay description">
                Join us for an exciting meetup where AI enthusiasts, developers, and innovators come together to explore the latest in artificial intelligence and machine learning.
            </p>

            <!-- Decorative Elements -->
            <div class="fade-in-delay dots">
                <div class="dot dot-1"></div>
                <div class="dot dot-2"></div>
                <div class="dot dot-3"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>&copy; 2026 The AI Stack. All rights reserved.</p>
    </div>
</body>
</html>
